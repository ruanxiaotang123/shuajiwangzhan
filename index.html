<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软小糖的刷机日常工具</title>
    <!-- 引入图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-sub: #666;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            color: #2d3436;
            font-size: 32px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #636e72;
            margin-top: 10px;
            font-size: 14px;
        }

        .nav-grid {
            display: grid;
            gap: 20px;
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease backwards;
        }

        /* 不同的延迟动画 */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.08);
        }

        /* 左侧装饰条 */
        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            margin-right: 20px;
            flex-shrink: 0;
        }

        /* 不同卡片的图标颜色 */
        .card-1 .icon-box { background: #e3f2fd; color: #2196f3; }
        .card-2 .icon-box { background: #e8f5e9; color: #4caf50; }
        .card-3 .icon-box { background: #fff3e0; color: #ff9800; }
        .card-4 .icon-box { background: #f3e5f5; color: #9c27b0; }

        .card-content {
            text-align: left;
            flex-grow: 1;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 5px 0;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0;
        }

        .arrow-icon {
            color: #dfe6e9;
            font-size: 20px;
            transition: color 0.3s;
        }

        .card:hover .arrow-icon {
            color: var(--primary-color);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }
            .card-title {
                font-size: 16px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

        </header>

            <!-- 1. 软小糖ROM包 -->
